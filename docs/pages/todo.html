<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待办事项 - 商标管理系统</title>
<link rel="stylesheet" href="../css/common.css">
<style>
.form-section { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border-color);
  border-radius: var(--radius-md); font-size: 13px; color: var(--text-primary);
  background: var(--bg-card); outline: none; transition: var(--transition);
}
.form-input:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.form-textarea { min-height: 80px; resize: vertical; }
.form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <div class="main-content">
    <header class="top-header"></header>
    <div class="page-container">
      <div class="page-header">
        <div>
          <div class="page-title">待办事项</div>
          <div class="page-desc" id="pageDesc">您有 8 项待处理任务</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-secondary btn-sm">📥 导出</button>
          <button class="btn btn-primary btn-sm" onclick="openNewTaskModal()">➕ 新建任务</button>
        </div>
      </div>
      
      <div class="filter-bar">
        <div class="filter-item active" data-filter="all" onclick="filterTodos(this,'all')">全部</div>
        <div class="filter-item" data-filter="案件处理" onclick="filterTodos(this,'案件处理')">案件处理</div>
        <div class="filter-item" data-filter="费用审批" onclick="filterTodos(this,'费用审批')">费用审批</div>
        <div class="filter-item" data-filter="文件批注" onclick="filterTodos(this,'文件批注')">文件批注</div>
        <div class="filter-item" data-filter="风险评估" onclick="filterTodos(this,'风险评估')">风险评估</div>
        <div style="margin-left:auto; display:flex; gap:8px;">
          <input type="text" class="search-input" placeholder="搜索任务..." id="todoSearch" oninput="searchTodos(this.value)">
          <select class="filter-item" style="min-width:100px;" id="sortSelect" onchange="sortTodos(this.value)">
            <option value="default">默认排序</option>
            <option value="urgent">紧急优先</option>
            <option value="time-asc">时间升序</option>
            <option value="time-desc">时间降序</option>
          </select>
        </div>
      </div>
      
      <div class="card">
        <div class="card-body" style="padding:0;">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:40px;"><input type="checkbox"></th>
                <th>任务名称</th>
                <th>关联案件</th>
                <th>任务类型</th>
                <th>优先级</th>
                <th>截止日</th>
                <th>状态</th>
                <th style="text-align:right;">操作</th>
              </tr>
            </thead>
            <tbody id="todoList"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 新建任务模态框 -->
<div class="modal-overlay" id="newTaskModal">
  <div class="modal">
    <div class="modal-header">
      <div style="font-weight:600;">➕ 新建任务</div>
      <div style="cursor:pointer;font-size:18px;color:var(--text-muted);" onclick="closeModal()">×</div>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-section">
          <label class="form-label">任务名称 <span class="required">*</span></label>
          <input type="text" class="form-input" id="taskTitle" placeholder="请输入任务名称">
        </div>
        <div class="form-section">
          <label class="form-label">任务类型 <span class="required">*</span></label>
          <select class="form-select" id="taskType">
            <option>案件处理</option>
            <option>费用审批</option>
            <option>文件批注</option>
            <option>风险评估</option>
            <option>预算编制</option>
            <option>证据管理</option>
            <option>服务评价</option>
            <option>监测报告</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-section">
          <label class="form-label">关联案件</label>
          <select class="form-select" id="taskCase">
            <option value="">请选择关联案件</option>
            <option>TM-2026-0042 云智-驳回复审</option>
            <option>TM-2026-0031 智联-异议答辩</option>
            <option>TM-2025-0189 海翼-马德里申请</option>
            <option>TM-2025-0098 星联-续展</option>
          </select>
        </div>
        <div class="form-section">
          <label class="form-label">优先级 <span class="required">*</span></label>
          <select class="form-select" id="taskPriority">
            <option value="urgent">紧急</option>
            <option value="high">高</option>
            <option value="medium">中</option>
            <option value="normal" selected>普通</option>
            <option value="low">低</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-section">
          <label class="form-label">截止日 <span class="required">*</span></label>
          <input type="date" class="form-input" id="taskDeadline">
        </div>
        <div class="form-section">
          <label class="form-label">负责人 <span class="required">*</span></label>
          <select class="form-select" id="taskOwner">
            <option>张法务</option>
            <option>李流程</option>
            <option>王流程</option>
            <option>赵法务</option>
          </select>
        </div>
      </div>
      <div class="form-section">
        <label class="form-label">任务描述</label>
        <textarea class="form-textarea" id="taskDesc" placeholder="补充任务背景、要求或注意事项..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitTask()">✅ 创建任务</button>
    </div>
  </div>
</div>

<script src="../js/data.js?v=2.5"></script>
<script src="../js/app.js?v=2.5"></script>
<script>
initApp('todo');

let currentTodos = [...AppData.todos];
let currentFilter = 'all';

function renderTodos(list) {
  const tbody = document.getElementById('todoList');
  tbody.innerHTML = '';
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted);">暂无符合条件的任务</td></tr>';
    return;
  }
  list.forEach(t => {
    const color = t.priority==='urgent' ? '#f87171' : '';
    tbody.innerHTML += `
      <tr>
        <td><input type="checkbox"></td>
        <td>
          <div style="font-weight:500;">${t.title}</div>
        </td>
        <td><span style="font-family:monospace;font-size:12px;color:var(--primary);font-weight:500;">${t.caseNo}</span></td>
        <td><span class="tag tag-gray">${t.type}</span></td>
        <td>${getPriorityTag(t.priority)}</td>
        <td style="color:${color};font-weight:500;">${t.deadline}</td>
        <td><span class="tag tag-orange">${t.status}</span></td>
        <td style="text-align:right;">
          <button class="btn btn-primary btn-sm" style="padding:4px 10px;">处理</button>
        </td>
      </tr>
    `;
  });
  document.getElementById('pageDesc').textContent = `您有 ${list.length} 项待处理任务`;
}

renderTodos(currentTodos);

function filterTodos(el, type) {
  document.querySelectorAll('.filter-bar .filter-item[data-filter]').forEach(item => item.classList.remove('active'));
  el.classList.add('active');
  currentFilter = type;
  applyFilters();
}

function searchTodos(keyword) {
  applyFilters();
}

function sortTodos(sortType) {
  applyFilters();
}

function applyFilters() {
  let result = [...AppData.todos];
  
  // 类型筛选
  if (currentFilter !== 'all') {
    result = result.filter(t => t.type === currentFilter);
  }
  
  // 搜索
  const keyword = document.getElementById('todoSearch').value.trim().toLowerCase();
  if (keyword) {
    result = result.filter(t => t.title.toLowerCase().includes(keyword) || t.caseNo.toLowerCase().includes(keyword));
  }
  
  // 排序
  const sortType = document.getElementById('sortSelect').value;
  if (sortType === 'urgent') {
    const order = { urgent: 0, high: 1, medium: 2, normal: 3, low: 4 };
    result.sort((a, b) => order[a.priority] - order[b.priority]);
  } else if (sortType === 'time-asc') {
    result.sort((a, b) => a.deadline.localeCompare(b.deadline));
  } else if (sortType === 'time-desc') {
    result.sort((a, b) => b.deadline.localeCompare(a.deadline));
  }
  
  currentTodos = result;
  renderTodos(result);
}

function openNewTaskModal() {
  document.getElementById('newTaskModal').classList.add('active');
  // 默认截止日为7天后
  const d = new Date(); d.setDate(d.getDate() + 7);
  document.getElementById('taskDeadline').value = d.toISOString().slice(0,10);
}

function closeModal() {
  document.getElementById('newTaskModal').classList.remove('active');
}

function submitTask() {
  const title = document.getElementById('taskTitle').value.trim();
  const type = document.getElementById('taskType').value;
  const caseSel = document.getElementById('taskCase').value;
  const priority = document.getElementById('taskPriority').value;
  const deadline = document.getElementById('taskDeadline').value;
  const owner = document.getElementById('taskOwner').value;
  
  if (!title || !deadline) {
    alert('请填写必填项！');
    return;
  }
  
  const caseNo = caseSel ? caseSel.split(' ')[0] : 'EV-2026-00' + (AppData.todos.length + 1);
  const newTask = {
    id: AppData.todos.length + 1,
    title: title,
    type: type,
    priority: priority,
    deadline: deadline,
    caseNo: caseNo,
    status: '待处理'
  };
  
  AppData.todos.unshift(newTask);
  closeModal();
  applyFilters();
  alert('任务创建成功！');
  
  // 清空表单
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
}
</script>
<script src="../js/data-service.js?v=2.5"></script>
</body>
</html>
