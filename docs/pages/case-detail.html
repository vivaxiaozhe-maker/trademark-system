<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件详情 - 商标管理系统</title>
<link rel="stylesheet" href="../css/common.css">
<style>
/* Breadcrumb */
/* Header */
.case-header {
  display: flex; align-items: flex-start; gap: 20px;
  margin-bottom: 20px; padding: 20px;
  background: var(--bg-card); border-radius: var(--radius-lg);
  border: 1px solid var(--border-color);
}
.case-header-img {
  width: 80px; height: 80px; border-radius: 16px;
  object-fit: contain; background: #f8fafc;
  border: 1px solid var(--border-color); flex-shrink: 0;
}
.case-header-main { flex: 1; }
.case-header-title {
  font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.case-header-meta {
  font-size: 13px; color: var(--text-secondary); margin-top: 6px;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.case-header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.badge-deadline {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
}

/* Info grid */
.info-grid-4 {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 20px;
}
.info-item-v2 {
  padding: 14px; background: var(--bg-card); border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
}
.info-label-v2 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.info-value-v2 { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.info-progress { margin-top: 8px; }
.progress-track { height: 6px; background: var(--bg-body); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

/* Timeline v3 */
.timeline-v3 { position: relative; padding-left: 28px; }
.timeline-v3::before {
  content: ""; position: absolute; left: 7px; top: 0; bottom: 0;
  width: 2px; background: #e2e8f0; border-radius: 2px;
}
.timeline-v3-item { position: relative; padding-bottom: 24px; }
.timeline-v3-item::before {
  content: ""; position: absolute; left: -24px; top: 2px;
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid #cbd5e1; background: #fff;
}
.timeline-v3-item.completed::before {
  background: #10b981; border-color: #10b981;
}
.timeline-v3-item.rejected::before {
  background: #ef4444; border-color: #ef4444; cursor: pointer;
}
.timeline-v3-item.current::before {
  background: #2563eb; border-color: #2563eb;
  animation: pulse-blue 2s infinite;
}
@keyframes pulse-blue {
  0% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); }
  70% { box-shadow: 0 0 0 10px rgba(37,99,235,0); }
  100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); }
}
.timeline-v3-title { font-weight: 600; font-size: 13px; }
.timeline-v3-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.timeline-v3-detail {
  margin-top: 8px; padding: 10px 12px; background: var(--bg-body);
  border-radius: var(--radius-sm); font-size: 12px; color: var(--text-secondary);
}
.timeline-v3-detail.hidden { display: none; }
.timeline-rejection-btn {
  margin-top: 8px; display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 12px; border-radius: var(--radius-md); font-size: 12px;
  background: var(--danger); color: #fff; border: none; cursor: pointer;
}

/* Drawer */
.drawer-overlay {
  display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.4); z-index: 300;
}
.drawer-overlay.active { display: block; }
.drawer-panel {
  position: fixed; right: 0; top: 0; bottom: 0; width: 420px;
  background: var(--bg-card); box-shadow: -4px 0 24px rgba(0,0,0,0.1);
  transform: translateX(100%); transition: transform 0.3s ease;
  z-index: 301; overflow-y: auto;
}
.drawer-overlay.active .drawer-panel { transform: translateX(0); }
.drawer-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-body { padding: 20px; }

/* Document cards */
.doc-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border: 1px solid var(--border-color);
  border-radius: var(--radius-md); margin-bottom: 10px;
  transition: var(--transition);
}
.doc-card:hover { border-color: var(--primary); background: var(--primary-light); }
.doc-card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.doc-card-icon.official { background: #fee2e2; color: #dc2626; }
.doc-card-icon.lawfirm { background: #dbeafe; color: #2563eb; }
.doc-card-icon.evidence { background: #d1fae5; color: #16a34a; }
.doc-card-icon.internal { background: #fef3c7; color: #d97706; }
.doc-card-info { flex: 1; min-width: 0; }
.doc-card-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-card-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
.doc-card-actions { display: flex; gap: 6px; }

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--border-color); border-radius: var(--radius-md);
  padding: 24px; text-align: center; color: var(--text-muted);
  transition: var(--transition); cursor: pointer; margin-top: 12px;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--primary); background: var(--primary-light); color: var(--primary);
}

/* Fee timeline */
.fee-timeline { position: relative; padding-left: 20px; }
.fee-timeline::before {
  content: ""; position: absolute; left: 5px; top: 4px; bottom: 4px;
  width: 2px; background: var(--border-color);
}
.fee-timeline-item { position: relative; padding-bottom: 16px; }
.fee-timeline-item::before {
  content: ""; position: absolute; left: -20px; top: 4px;
  width: 10px; height: 10px; border-radius: 50%; background: var(--primary);
}
.fee-timeline-item.paid::before { background: var(--success); }
.fee-timeline-header { display: flex; justify-content: space-between; align-items: center; }
.fee-timeline-title { font-size: 13px; font-weight: 600; }
.fee-timeline-amount { font-size: 13px; font-weight: 700; }
.fee-timeline-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* Message stream */
.msg-filter-bar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.msg-filter-btn {
  padding: 5px 12px; border-radius: var(--radius-md); font-size: 12px;
  border: 1px solid var(--border-color); background: var(--bg-card); cursor: pointer;
}
.msg-filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.msg-stream { display: flex; flex-direction: column; gap: 12px; }
.msg-item {
  display: flex; gap: 12px;
}
.msg-item.self { flex-direction: row-reverse; }
.msg-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.msg-avatar.lawfirm { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
.msg-avatar.internal { background: linear-gradient(135deg, #f59e0b, #d97706); }
.msg-avatar.system { background: linear-gradient(135deg, #10b981, #059669); }
.msg-bubble {
  max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 13px;
}
.msg-bubble.left { background: #f1f5f9; border-radius: 12px 12px 12px 4px; color: var(--text-primary); }
.msg-bubble.right { background: var(--primary); color: #fff; border-radius: 12px 12px 4px 12px; }
.msg-bubble-system {
  max-width: 100%; padding: 10px 14px; background: #f8fafc;
  border-radius: var(--radius-md); font-size: 13px; color: var(--text-secondary);
  border: 1px dashed var(--border-color); text-align: center;
}
.msg-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.msg-meta.right { color: rgba(255,255,255,0.7); }
.msg-input-area {
  display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);
}

/* Collapsible section */
.collapse-toggle {
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  font-size: 13px; color: var(--primary); font-weight: 500;
}
.collapse-content { overflow: hidden; transition: max-height 0.3s ease; }
.collapse-content.collapsed { max-height: 300px; }
.collapse-content.expanded { max-height: 2000px; }

/* Responsive */
@media (max-width: 768px) {
  .case-header { flex-wrap: wrap; }
  .case-header-actions { width: 100%; margin-top: 10px; }
  .info-grid-4 { grid-template-columns: repeat(2, 1fr); }
  .drawer-panel { width: 100%; }
}
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <div class="main-content">
    <header class="top-header"></header>
    <div class="page-container">
      <!-- Header -->
      <div class="case-header" id="caseHeader"></div>
      
      <!-- Info Grid -->
      <div class="info-grid-4" id="infoGrid"></div>
      
      <div class="row row-3">
        <!-- Timeline -->
        <div class="card">
          <div class="card-header"><div class="card-title">📈 案件进度</div></div>
          <div class="card-body">
            <div class="timeline-v3" id="timeline"></div>
          </div>
        </div>
        
        <!-- Documents -->
        <div class="card">
          <div class="card-header"><div class="card-title">📁 案件文档</div></div>
          <div class="card-body">
            <div id="docList"></div>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
              <div style="font-size:24px;margin-bottom:6px;">📤</div>
              <div style="font-size:13px;font-weight:500;">点击或拖拽文件到此处上传</div>
              <div style="font-size:11px;margin-top:4px;">支持 PDF、DOCX、ZIP，单个不超过 50MB</div>
              <input type="file" id="fileInput" multiple style="display:none;" onchange="handleFileUpload(this)">
            </div>
          </div>
        </div>
        
        <!-- Fees -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">💰 费用明细</div>
          </div>
          <div class="card-body">
            <div id="feeSummary"></div>
            <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border-color);">
              <div class="card-title" style="font-size:13px; margin-bottom:10px;">📋 费用时间线</div>
              <div class="fee-timeline" id="feeTimeline"></div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Collaboration Messages -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">💬 协作记录</div>
          <div class="collapse-toggle" onclick="toggleMsgCollapse()">
            <span id="collapseIcon">▲</span> <span id="collapseText">收起</span>
          </div>
        </div>
        <div class="card-body collapse-content expanded" id="msgCollapse">
          <div class="msg-filter-bar">
            <button class="msg-filter-btn active" onclick="filterMessages('all', this)">全部</button>
            <button class="msg-filter-btn" onclick="filterMessages('lawfirm', this)">律所</button>
            <button class="msg-filter-btn" onclick="filterMessages('internal', this)">内部</button>
            <button class="msg-filter-btn" onclick="filterMessages('system', this)">系统</button>
          </div>
          <div class="msg-stream" id="msgStream"></div>
          <div style="text-align:center; margin-top:12px;">
            <button class="btn btn-sm btn-secondary" id="loadMoreBtn" onclick="loadMoreMessages()">加载更多</button>
          </div>
          <div class="msg-input-area">
            <input type="text" id="quickReply" style="flex:1;padding:8px 12px;border:1px solid var(--border-color);border-radius:var(--radius-md);outline:none;" placeholder="输入快捷回复...">
            <button class="btn btn-primary" onclick="sendQuickReply()">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Cited Trademark Drawer -->
<div class="drawer-overlay" id="citedDrawerOverlay" onclick="closeCitedDrawer()">
  <div class="drawer-panel" onclick="event.stopPropagation()">
    <div class="drawer-header">
      <div style="font-weight:600;">🔍 引证商标详情</div>
      <div style="cursor:pointer;font-size:20px;color:var(--text-muted);" onclick="closeCitedDrawer()">×</div>
    </div>
    <div class="drawer-body" id="citedDrawerBody"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <div style="font-weight:600;">✏️ 编辑案件</div>
      <div style="cursor:pointer;font-size:18px;color:var(--text-muted);" onclick="closeEditModal()">×</div>
    </div>
    <div class="modal-body" id="editModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 保存修改</button>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="../js/data-service.js"></script>
<script>
initApp('case-detail');

// ==================== State ====================
const params = new URLSearchParams(location.search);
const caseId = params.get('id') || 'TM-2026-0042';
const isEditMode = params.get('mode') === 'edit';
let caseData = DataService.getCaseById(caseId);
if (!caseData) {
  caseData = DataService.getCases()[0];
}

if (isEditMode && caseData) {
  document.title = `案件详情 - 编辑中 · ${caseData.brandName}（${caseData.id}）- 商标管理系统`;
}

let msgFilter = 'all';
let msgCollapsed = false;
let msgPage = 1;
const MSG_PAGE_SIZE = 5;

// ==================== Helpers ====================
function renderStatusTag(statusCode) {
  const map = DataService.STATUS_MAP[statusCode] || { label: statusCode, color: 'gray' };
  const colorMap = {
    blue: '#2563eb', green: '#10b981', orange: '#f59e0b', gray: '#64748b',
    red: '#ef4444', success: '#10b981', danger: '#ef4444', purple: '#8b5cf6',
    cyan: '#06b6d4', indigo: '#6366f1'
  };
  const bgMap = {
    blue: '#dbeafe', green: '#d1fae5', orange: '#fef3c7', gray: '#f1f5f9',
    red: '#fee2e2', success: '#d1fae5', danger: '#fee2e2', purple: '#f3e8ff',
    cyan: '#cffafe', indigo: '#e0e7ff'
  };
  const color = colorMap[map.color] || '#64748b';
  const bg = bgMap[map.color] || '#f1f5f9';
  return `<span style="display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600;color:${color};background:${bg};">${map.label}</span>`;
}

function getDeadlineInfo(deadline) {
  const days = DataService.daysBetween(DataService.getToday(), deadline);
  let color = '#94a3b8', badgeClass = '';
  let text = days <= 0 ? '已逾期' : `剩余 ${days} 天`;
  if (days <= 3 && days > 0) { color = '#ef4444'; badgeClass = 'urgent-pulse'; }
  else if (days <= 7 && days > 0) color = '#f59e0b';
  return { days, color, text, badgeClass };
}

function getNiceClassTooltip(niceClasses) {
  if (!niceClasses || !niceClasses.length) return '';
  return niceClasses.map(c => `${c}-${DataService.NICE_CLASS_NAMES[c] || '未知'}`).join(', ');
}

// ==================== Render Header ====================
function renderHeader() {
  const c = caseData;
  const dl = getDeadlineInfo(c.officialDeadline);
  const statusMap = DataService.STATUS_MAP[c.statusCode] || { label: c.status, color: 'gray' };
  
  const typeLabel = c.type === 'domestic' ? '国内案件' : '海外案件';
  
  const editBadge = isEditMode ? `<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#92400e;background:#fef3c7;">✏️ 编辑中</span>` : '';
  
  const actions = isEditMode ? `
    <button class="btn btn-sm btn-secondary" onclick="cancelEdit()">❌ 取消</button>
    <button class="btn btn-sm btn-primary" onclick="saveEditForm()">💾 保存修改</button>
  ` : `
    <button class="btn btn-sm btn-warning" style="background:#fef3c7;color:#92400e;border:none;" onclick="remindCase()">⏰ 催办</button>
    <a href="mailto:${c.lawFirmName}" class="btn btn-sm btn-secondary">✉️ 发送邮件</a>
    <button class="btn btn-sm btn-secondary" onclick="exportReport()">📄 导出报告</button>
    <button class="btn btn-sm btn-primary" onclick="enterEditMode()">✏️ 编辑</button>
  `;
  
  document.getElementById('caseHeader').innerHTML = `
    <img src="${c.trademarkImage}" alt="${c.brandName}" class="case-header-img">
    <div class="case-header-main">
      <div class="case-header-title">
        ${c.brandName}
        <span style="font-size:14px;color:var(--text-muted);font-weight:400;">${c.id}</span>
        ${renderStatusTag(c.statusCode)}
        ${editBadge}
        <span class="badge-deadline" style="background:${dl.color}15;color:${dl.color};${dl.badgeClass ? 'animation: pulse-red 2s infinite;' : ''}">
          ⏰ ${dl.text}
        </span>
      </div>
      <div class="case-header-meta">
        <span>${c.businessType}</span>
        <span>·</span>
        <span>${typeLabel}</span>
        <span>·</span>
        <span>${c.lawFirmName} 代理</span>
        <span>·</span>
        <span>负责人：${c.responsibleUser}</span>
      </div>
    </div>
    <div class="case-header-actions">
      ${actions}
    </div>
  `;
}

// ==================== Render Info Grid ====================
function renderInfoGrid() {
  const c = caseData;
  const dl = getDeadlineInfo(c.officialDeadline);
  const idl = getDeadlineInfo(c.internalDeadline);
  
  if (isEditMode) {
    document.getElementById('infoGrid').innerHTML = `
      <div class="info-item-v2">
        <div class="info-label-v2">尼斯分类</div>
        <input type="text" class="form-input" id="editNiceClasses" value="${c.niceClassNames}" style="width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:13px;">
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">申请号</div>
        <div class="info-value-v2" style="color:var(--text-muted);">${c.id}</div>
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">申请日</div>
        <input type="date" class="form-input" id="editAppDate" value="${c.applicationDate}" style="width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:13px;">
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">官方绝限</div>
        <input type="date" class="form-input" id="editDeadline" value="${c.officialDeadline}" style="width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:13px;">
        <div style="font-size:11px;color:${dl.color};margin-top:2px;">${dl.text}</div>
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">内部期限</div>
        <input type="date" class="form-input" id="editInternalDeadline" value="${c.internalDeadline}" style="width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:13px;">
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">当前进度 (%)</div>
        <input type="number" class="form-input" id="editProgress" value="${c.currentProgress}" min="0" max="100" style="width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:13px;">
        <div class="info-progress" style="margin-top:6px;">
          <div class="progress-track"><div class="progress-fill" style="width:${c.currentProgress}%;background:var(--primary);"></div></div>
        </div>
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">代理费 (¥)</div>
        <input type="number" class="form-input" id="editFeeTotal" value="${c.feeTotal}" style="width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:13px;">
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">官费 (¥)</div>
        <input type="number" class="form-input" id="editFeePaid" value="${c.feePaid}" style="width:100%;padding:8px 10px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:13px;">
      </div>
    `;
  } else {
    document.getElementById('infoGrid').innerHTML = `
      <div class="info-item-v2">
        <div class="info-label-v2">尼斯分类</div>
        <div class="info-value-v2" title="${getNiceClassTooltip(c.niceClasses)}">${c.niceClassNames}</div>
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">申请号</div>
        <div class="info-value-v2">${c.id}</div>
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">申请日</div>
        <div class="info-value-v2">${c.applicationDate}</div>
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">官方绝限</div>
        <div class="info-value-v2" style="color:${dl.color};">${c.officialDeadline}</div>
        <div style="font-size:11px;color:${dl.color};margin-top:2px;">${dl.text}</div>
      </div>
      <div class="info-item-v2">
        <div class="info-label-v2">内部期限</div>
        <div class="info-value-v2" style="color:${idl.color};">${c.internalDeadline}</div>

// ==================== Render Timeline ====================
function renderTimeline() {
  const c = caseData;
  let html = '';
  c.timeline.forEach(t => {
    const statusClass = t.status === 'completed' ? 'completed' : t.status === 'rejected' ? 'rejected' : t.status === 'current' ? 'current' : '';
    const expandable = t.status === 'rejected' && t.detail;
    const detailId = expandable ? `tl-detail-${t.id}` : '';
    
    html += `
      <div class="timeline-v3-item ${statusClass}">
        <div class="timeline-v3-title">${t.title}</div>
        <div class="timeline-v3-meta">${t.date || ''} · ${t.actor || ''} ${t.detail && !expandable ? '· ' + t.detail : ''}</div>
        ${expandable ? `
          <div class="timeline-v3-detail" id="${detailId}">
            <div style="color:var(--danger);font-weight:600;margin-bottom:4px;">⚠️ 驳回原因</div>
            <div>${t.detail}</div>
            <button class="timeline-rejection-btn" onclick="openCitedDrawer('${t.detail}')">🔍 查看在先商标</button>
          </div>
        ` : ''}
        ${t.status === 'current' && t.detail ? `<div class="timeline-v3-detail">${t.detail}</div>` : ''}
      </div>
    `;
  });
  document.getElementById('timeline').innerHTML = html;
}

// ==================== Cited Trademark Drawer ====================

  document.getElementById('citedDrawerBody').innerHTML = `
    <div style="text-align:center;margin-bottom:20px;">
      <div style="width:100px;height:100px;border-radius:16px;background:#f1f5f9;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:40px;">🏷️</div>
      <div style="font-weight:600;font-size:16px;margin-top:12px;">${name}</div>
      <div style="font-size:12px;color:var(--text-muted);">注册号：${regNo}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div class="info-item-v2"><div class="info-label-v2">国际分类</div><div class="info-value-v2">第9类</div></div>
      <div class="info-item-v2"><div class="info-label-v2">注册日期</div><div class="info-value-v2">2024-03-15</div></div>
      <div class="info-item-v2"><div class="info-label-v2">权利人</div><div class="info-value-v2">深圳${name}有限公司</div></div>
      <div class="info-item-v2"><div class="info-label-v2">商标状态</div><div class="info-value-v2">有效注册</div></div>
    </div>
    <div style="background:#fee2e2;border-radius:var(--radius-md);padding:12px;margin-bottom:16px;">
      <div style="font-size:12px;font-weight:600;color:#b91c1c;margin-bottom:4px;">⚠️ 冲突分析</div>
      <div style="font-size:12px;color:#7f1d1d;">与本案商标在「第9类-科学仪器」上构成近似，相似度评估：85%</div>

function closeCitedDrawer() {
  document.getElementById('citedDrawerOverlay').classList.remove('active');
}

// ==================== Render Documents ====================
function renderDocuments() {
  const c = caseData;
  const iconMap = {
    official: { icon: '📜', cls: 'official' },
    lawfirm: { icon: '🏢', cls: 'lawfirm' },
    evidence: { icon: '📁', cls: 'evidence' },
    internal: { icon: '📝', cls: 'internal' }
  };
  
  let html = '';
  c.documents.forEach(d => {
    const ic = iconMap[d.type] || { icon: '📄', cls: 'official' };
    const statusBadge = d.status === 'pending_review' 
      ? `<span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;color:#92400e;background:#fef3c7;">待批注</span>` 
      : '';
    
    html += `
      <div class="doc-card">
        <div class="doc-card-icon ${ic.cls}">${ic.icon}</div>
        <div class="doc-card-info">
          <div class="doc-card-name">${d.name}</div>
          <div class="doc-card-meta">
            <span>${d.typeLabel}</span>
            <span>·</span>
            <span>${d.uploadDate}</span>
            <span>·</span>
            <span>${d.size}</span>
            ${statusBadge}
          </div>
        </div>
        <div class="doc-card-actions">
          <button class="btn btn-sm btn-secondary" style="padding:4px 8px;font-size:11px;" title="预览">👁️</button>
          <button class="btn btn-sm btn-secondary" style="padding:4px 8px;font-size:11px;" title="下载">⬇️</button>
          ${d.status === 'pending_review' ? `<button class="btn btn-sm btn-primary" style="padding:4px 8px;font-size:11px;" title="批注">📝</button>` : ''}

}

// Drag & drop
const dropZone = document.getElementById('dropZone');
if (dropZone) {
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    handleFileUpload({ files: e.dataTransfer.files });
  });
}

function handleFileUpload(input) {
  const files = input.files || input;
  if (!files || !files.length) return;
  const names = Array.from(files).map(f => f.name).join(', ');
  alert(`已选择上传文件：${names}\n（演示模式：实际上传功能需后端支持）`);
}

// ==================== Render Fees ====================
function renderFees() {
  const c = caseData;
  const allFees = DataService.getFees ? DataService.getFees().filter(f => f.caseId === c.id) : [];
  
  document.getElementById('feeSummary').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-size:13px;">费用合计</span>
      <span style="font-size:18px;font-weight:700;color:var(--primary);">¥${c.feeTotal.toLocaleString()}</span>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:12px;">
      <div style="flex:1;text-align:center;padding:10px;background:#d1fae5;border-radius:var(--radius-md);">
        <div style="font-size:11px;color:#065f46;">已付款</div>
        <div style="font-size:14px;font-weight:700;color:#059669;">¥${c.feePaid.toLocaleString()}</div>
      </div>
      <div style="flex:1;text-align:center;padding:10px;background:#fef3c7;border-radius:var(--radius-md);">
        <div style="font-size:11px;color:#92400e;">待付款</div>
        <div style="font-size:14px;font-weight:700;color:#d97706;">¥${c.feePending.toLocaleString()}</div>
      </div>
    </div>
  `;
  
  let tlHtml = '';
  if (allFees.length === 0) {
    tlHtml = '<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:20px;">暂无费用记录</div>';
  } else {
    allFees.forEach(f => {
      const isPaid = f.status === 'paid';
      tlHtml += `
        <div class="fee-timeline-item ${isPaid ? 'paid' : ''}">
          <div class="fee-timeline-header">
            <span class="fee-timeline-title">${f.typeLabel}</span>
            <span class="fee-timeline-amount" style="color:${isPaid ? 'var(--success)' : 'var(--warning)'}">¥${f.amount.toLocaleString()}</span>
          </div>
          <div class="fee-timeline-meta">${f.createdAt} · ${f.note || ''} · ${isPaid ? '已支付' : '待支付'}</div>
        </div>
      `;
    });
  }
  document.getElementById('feeTimeline').innerHTML = tlHtml;
}

// ==================== Render Messages ====================
function renderMessages() {
  const c = caseData;
  let msgs = c.messages || [];
  
  if (msgFilter !== 'all') {
    msgs = msgs.filter(m => m.senderType === msgFilter || (msgFilter === 'system' && m.senderType === 'system'));
  }
  
  const displayMsgs = msgs.slice(0, msgPage * MSG_PAGE_SIZE);
  const hasMore = msgs.length > displayMsgs.length;
  
  let html = '';
  displayMsgs.forEach(m => {
    const isSelf = m.senderType === 'internal';
    const avatarBg = m.senderType === 'lawfirm' ? 'lawfirm' : m.senderType === 'system' ? 'system' : 'internal';
    const initial = m.senderAvatar || m.sender.charAt(0);
    
    if (m.senderType === 'system') {
      html += `
        <div class="msg-item">
          <div class="msg-bubble-system">
            <span style="font-weight:600;">📢 ${m.sender}</span>
            <div style="margin-top:4px;">${m.content}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${m.date}</div>
          </div>
        </div>
      `;
    } else {
      html += `
        <div class="msg-item ${isSelf ? 'self' : ''}">
          <div class="msg-avatar ${avatarBg}">${initial}</div>
          <div>
            <div class="msg-bubble ${isSelf ? 'right' : 'left'}">${m.content}</div>
            <div class="msg-meta ${isSelf ? 'right' : ''}" style="text-align:${isSelf ? 'right' : 'left'};">${m.sender} · ${m.date}</div>
          </div>
        </div>
      `;
    }
  });
  
  document.getElementById('msgStream').innerHTML = html || '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">暂无协作记录</div>';
  document.getElementById('loadMoreBtn').style.display = hasMore ? 'inline-block' : 'none';
}

function filterMessages(type, btn) {
  msgFilter = type;
  msgPage = 1;
  document.querySelectorAll('.msg-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMessages();
}

function loadMoreMessages() {
  msgPage++;
  renderMessages();
}

function toggleMsgCollapse() {
  const content = document.getElementById('msgCollapse');
  const icon = document.getElementById('collapseIcon');
  const text = document.getElementById('collapseText');
  msgCollapsed = !msgCollapsed;
  content.classList.toggle('collapsed', msgCollapsed);
  content.classList.toggle('expanded', !msgCollapsed);
  icon.textContent = msgCollapsed ? '▼' : '▲';
  text.textContent = msgCollapsed ? '展开' : '收起';
}

function sendQuickReply() {
  const input = document.getElementById('quickReply');
  const text = input.value.trim();
  if (!text) return;
  
  caseData.messages.push({
    id: 'msg-' + Date.now(),
    sender: '张法务',
    senderAvatar: '张',
    senderType: 'internal',
    content: text,
    date: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-'),
    type: 'message'
  });
  DataService.updateCase(caseData.id, { messages: caseData.messages });
  input.value = '';
  renderMessages();
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
}

function saveEdit() {
  const updates = {
    brandName: document.getElementById('editBrandName').value,
    businessType: document.getElementById('editBusinessType').value,
    statusCode: document.getElementById('editStatus').value,
    status: DataService.STATUS_MAP[document.getElementById('editStatus').value]?.label || '',
    lawFirmName: document.getElementById('editLawFirm').value,
    officialDeadline: document.getElementById('editDeadline').value,
    responsibleUser: document.getElementById('editOwner').value,
    currentProgress: parseInt(document.getElementById('editProgress').value) || 0
  };
  DataService.updateCase(caseData.id, updates);
  caseData = DataService.getCaseById(caseData.id);
  closeEditModal();
  renderAll();
  alert('案件信息已更新！');
}

// ==================== Actions ====================
function remindCase() {
  alert(`已向 ${caseData.lawFirmName} 发送催办通知（案件：${caseData.id}）`);
}

function exportReport() {
  alert('正在生成案件报告 PDF...\n（演示模式：实际导出需后端支持）');
}

function enterEditMode() {
  const url = new URL(window.location.href);
  url.searchParams.set('mode', 'edit');
  window.location.href = url.toString();
}

function cancelEdit() {
  const url = new URL(window.location.href);
  url.searchParams.delete('mode');
  window.location.href = url.toString();
}

function saveEditForm() {
  const updates = {
    niceClassNames: document.getElementById('editNiceClasses').value,
    applicationDate: document.getElementById('editAppDate').value,
    officialDeadline: document.getElementById('editDeadline').value,
    internalDeadline: document.getElementById('editInternalDeadline').value,
    currentProgress: parseInt(document.getElementById('editProgress').value) || 0,
    feeTotal: parseInt(document.getElementById('editFeeTotal').value) || 0,
    feePaid: parseInt(document.getElementById('editFeePaid').value) || 0,
    feePending: (parseInt(document.getElementById('editFeeTotal').value) || 0) - (parseInt(document.getElementById('editFeePaid').value) || 0)
  };
  
  DataService.updateCase(caseData.id, updates);
  
  if (typeof showToast === 'function') {
    showToast('案件已更新', 'success');
  } else {
    alert('案件已更新');
  }
  
  // Return to detail mode after short delay
  setTimeout(() => {
    cancelEdit();
  }, 800);
}

function renderAll() {
  renderHeader();
  renderInfoGrid();
  renderTimeline();
  renderDocuments();
  renderFees();
  renderMessages();
}

renderAll();
</script>
