<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成报告 - 小米商标管理系统</title>
<link rel="stylesheet" href="../css/common.css">
<style>
.report-type-card {
  padding: 20px; border: 2px solid var(--border-color); border-radius: var(--radius-lg);
  cursor: pointer; transition: var(--transition); background: var(--bg-card);
  display: flex; flex-direction: column; gap: 8px;
}
.report-type-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: var(--shadow-md); }
.report-type-card.active { border-color: var(--primary); background: var(--primary-light); }
.report-type-card .icon { font-size: 32px; }
.report-type-card .title { font-weight: 600; font-size: 15px; }
.report-type-card .desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

.report-preview {
  background: #fff; border: 1px solid var(--border-color); border-radius: var(--radius-lg);
  padding: 32px; box-shadow: var(--shadow-sm);
  min-height: 400px;
}
.report-preview-header {
  text-align: center; padding-bottom: 20px; border-bottom: 2px solid var(--primary);
  margin-bottom: 24px;
}
.report-preview-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
.report-preview-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.report-preview-section { margin-bottom: 24px; }
.report-preview-section-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 10px; padding-left: 8px; border-left: 3px solid var(--primary); }
.report-preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.report-preview-table th { background: var(--bg-body); padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border-color); }
.report-preview-table td { padding: 8px 10px; border-bottom: 1px solid var(--border-color); }

.email-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; background: var(--primary-light); color: var(--primary-dark);
  border-radius: 20px; font-size: 12px; font-weight: 500;
}
.email-chip .remove { cursor: pointer; font-size: 14px; }

/* Risk matrix */
.risk-matrix { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
.risk-cell { padding: 10px 4px; text-align: center; border-radius: 4px; font-size: 11px; font-weight: 600; }
.risk-high { background: #fee2e2; color: #991b1b; }
.risk-medium { background: #fef3c7; color: #92400e; }
.risk-low { background: #d1fae5; color: #065f46; }
.risk-header { background: #f1f5f9; color: #475569; font-weight: 600; }

/* Score ring */
.score-ring {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; position: relative;
  background: conic-gradient(var(--primary) 0% 85%, #e2e8f0 85% 100%);
}
.score-ring::after {
  content: ""; position: absolute; inset: 4px; border-radius: 50%; background: #fff;
}
.score-ring span { position: relative; z-index: 1; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <div class="main-content">
    <header class="top-header"></header>
    <div class="page-container">
      <div class="page-header">
        <div>

        </div>
        <button class="btn btn-secondary btn-sm" onclick="history.back()">← 返回</button>
      </div>
      
      <div class="row row-3">
        <div style="grid-column: span 1;">
          <div class="card">
            <div class="card-header"><div class="card-title">📊 选择报告类型</div></div>

                <div class="desc">律所合作数据、成功率、响应速度、服务质量综合评价</div>
              </div>
            </div>
          </div>
          
          <div class="card" style="margin-top:16px;">
            <div class="card-header"><div class="card-title">📅 报告周期</div></div>
            <div class="card-body">
              <div style="display:flex; flex-direction:column; gap:8px;">
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;"><input type="radio" name="period" checked> 本月报告（2026年5月）</label>
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;"><input type="radio" name="period"> 本季度报告（2026 Q2）</label>
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;"><input type="radio" name="period"> 半年度报告（2026 H1）</label>
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;"><input type="radio" name="period"> 年度报告（2026年度）</label>
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;"><input type="radio" name="period"> 自定义范围</label>
              </div>
            </div>
          </div>
          
          <div class="card" style="margin-top:16px;">
            <div class="card-header"><div class="card-title">📧 推送设置</div></div>
            <div class="card-body">
              <div style="margin-bottom:12px;">
                <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">收件人邮箱</label>
                <input type="text" id="emailInput" placeholder="输入邮箱后按回车添加" style="width:100%;padding:9px 12px;border:1px solid var(--border-color);border-radius:var(--radius-md);font-size:13px;outline:none;" onkeydown="addEmail(event)">
              </div>
              <div id="emailList" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;">
                <div class="email-chip">zhang@xiaomi.com<span class="remove" onclick="this.parentElement.remove()">×</span></div>
                <div class="email-chip">li@xiaomi.com<span class="remove" onclick="this.parentElement.remove()">×</span></div>
              </div>
              <div style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-muted);">
                <input type="checkbox" id="scheduleSend" style="cursor:pointer;">
                <label for="scheduleSend" style="cursor:pointer;">定时推送（每月1日自动生成并发送）</label>
              </div>
            </div>
          </div>
          
          <div style="display:flex; gap:8px; margin-top:16px;">
            <button class="btn btn-primary" style="flex:1;" onclick="generateReport()">📊 生成报告</button>
            <button class="btn btn-secondary" style="flex:1;" onclick="pushToEmail()">📧 推送至邮箱</button>
          </div>
        </div>
        
        <div style="grid-column: span 2;">
          <div class="card" style="height:100%;">
            <div class="card-header flex-between">
              <div class="card-title">👁️ 报告预览</div>
              <div style="display:flex; gap:8px;">

              </div>
            </div>
            <div class="card-body" style="padding:0; overflow:auto; max-height:calc(100vh - 240px);">
              <div class="report-preview" id="reportPreview">
                <!-- 内容由JS动态切换 -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

function renderReport(type) {
  document.getElementById('reportPreview').innerHTML = reportTemplates[type] || reportTemplates.overview;
}

renderReport('overview');

function selectReport(el, type) {
  document.querySelectorAll('.report-type-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentReport = type;
  renderReport(type);
}

function addEmail(e) {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val && val.includes('@')) {
      const list = document.getElementById('emailList');
      const chip = document.createElement('div');
      chip.className = 'email-chip';
      chip.innerHTML = val + '<span class="remove" onclick="this.parentElement.remove()">×</span>';
      list.appendChild(chip);
      e.target.value = '';
    }
  }
}

function generateReport() {
  const preview = document.getElementById('reportPreview');
  preview.style.opacity = '0.5';
  preview.style.transform = 'scale(0.98)';
  setTimeout(() => {
    preview.style.transition = 'all 0.4s ease';
    preview.style.opacity = '1';
    preview.style.transform = 'scale(1)';
    alert('报告已生成！可以预览、下载或推送至邮箱。');
  }, 400);
}

function pushToEmail() {
  const emails = Array.from(document.querySelectorAll('.email-chip')).map(c => c.textContent.replace('×','').trim());
  if (emails.length === 0) {
    alert('请至少添加一个收件人邮箱！');
    return;
  }
  alert('报告已成功推送至：' + emails.join('、'));
}
