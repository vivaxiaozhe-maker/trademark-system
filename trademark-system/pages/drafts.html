<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的草稿 - 商标管理系统</title>
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <div class="main-content">
    <header class="top-header"></header>
    <div class="page-container">
      <div class="page-header">
        <div>
          <div class="page-title">我的草稿</div>
          <div class="page-desc">未提交的草稿共 4 份，支持续编、复制、删除</div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-body" style="padding:0;">
          <table class="data-table">
            <thead>
              <tr>
                <th>草稿类型</th>
                <th>标题</th>
                <th>创建时间</th>
                <th>最后修改</th>
                <th>完成度</th>
                <th style="text-align:right;">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><span class="tag tag-blue">案件创建</span></td>
                <td><strong>商标"极光"新申请</strong></td>
                <td>2026-05-03 10:00</td>
                <td>2026-05-03 14:20</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <div class="progress-bar" style="width:80px;"><div class="progress-fill" style="width:75%;background:#2563eb;"></div></div>
                    <span style="font-size:12px;">75%</span>
                  </div>
                </td>
                <td style="text-align:right;">
                  <button class="btn btn-primary btn-sm" style="padding:4px 10px;">续编</button>
                  <button class="btn btn-secondary btn-sm" style="padding:4px 10px;">复制</button>
                </td>
              </tr>
              <tr>
                <td><span class="tag tag-green">检索报告</span></td>
                <td><strong>"云图"近似商标检索</strong></td>
                <td>2026-05-02 09:30</td>
                <td>2026-05-02 16:00</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <div class="progress-bar" style="width:80px;"><div class="progress-fill" style="width:50%;background:#f59e0b;"></div></div>
                    <span style="font-size:12px;">50%</span>
                  </div>
                </td>
                <td style="text-align:right;">
                  <button class="btn btn-primary btn-sm" style="padding:4px 10px;">续编</button>
                  <button class="btn btn-secondary btn-sm" style="padding:4px 10px;">复制</button>
                </td>
              </tr>
              <tr>
                <td><span class="tag tag-orange">费用申请</span></td>
                <td><strong>Q2海外申请费用预算</strong></td>
                <td>2026-04-30 11:00</td>
                <td>2026-04-30 11:00</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <div class="progress-bar" style="width:80px;"><div class="progress-fill" style="width:20%;background:#ef4444;"></div></div>
                    <span style="font-size:12px;">20%</span>
                  </div>
                </td>
                <td style="text-align:right;">
                  <button class="btn btn-primary btn-sm" style="padding:4px 10px;">续编</button>
                  <button class="btn btn-secondary btn-sm" style="padding:4px 10px;">复制</button>
                </td>
              </tr>
              <tr>
                <td><span class="tag tag-blue">案件创建</span></td>
                <td><strong>商标"星河"马德里申请</strong></td>
                <td>2026-04-28 15:00</td>
                <td>2026-04-29 10:30</td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <div class="progress-bar" style="width:80px;"><div class="progress-fill" style="width:60%;background:#2563eb;"></div></div>
                    <span style="font-size:12px;">60%</span>
                  </div>
                </td>
                <td style="text-align:right;">
                  <button class="btn btn-primary btn-sm" style="padding:4px 10px;">续编</button>
                  <button class="btn btn-secondary btn-sm" style="padding:4px 10px;">复制</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>initApp('drafts');</script>
<script src="../js/data-service.js"></script>
</body>
</html>
